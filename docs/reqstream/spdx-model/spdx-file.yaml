---
# SpdxFile unit requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: SpdxFile Requirements
        requirements:
          - id: SpdxModel-Data-Files
            title: The library shall support SPDX files.
            tags:
              - data-model
            justification: |
              Files are essential components in SPDX documents for detailed SBOM creation. Supporting
              file elements enables fine-grained tracking of individual source files, binaries, and
              their associated licensing and copyright information.
            tests:
              - SpdxFile_SameComparer_MatchingAndDistinctFiles_ComparesCorrectly
              - SpdxFile_DeepCopy_FullyPopulatedFile_CreatesEqualButDistinctCopy
              - SpdxFile_Enhance_MatchingAndNewFiles_MergesCorrectly
              - SpdxFile_Validate_InvalidFileId_ReportsIssue
              - SpdxFile_Validate_InvalidFileName_ReportsIssue
              - SpdxFile_Validate_MissingSha1Checksum_ReportsIssue
              - SpdxFile_Validate_ValidFile_ReportsNoIssues
              - SpdxFileTypeExtensions_FromText_ValidInput_ParsesCorrectly
              - SpdxFileTypeExtensions_FromText_InvalidInput_ThrowsException
              - SpdxFileTypeExtensions_ToText_ValidEnum_FormatsCorrectly
              - SpdxFileTypeExtensions_ToText_InvalidEnum_ThrowsException
