---
# SpdxExtractedLicensingInfo unit requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: SpdxExtractedLicensingInfo Requirements
        requirements:
          - id: SpdxModel-Data-ExtractedLicensingInformation
            title: The library shall support SPDX extracted licensing information.
            tags:
              - data-model
            justification: |
              Extracted licensing information supports documenting non-standard licenses found in
              software packages. This is critical for compliance when software contains licenses not
              in the SPDX license list.
            tests:
              - SpdxExtractedLicensingInfo_SameComparer_ComparesCorrectly
              - SpdxExtractedLicensingInfo_DeepCopy_CreatesEqualButDistinctInstance
              - SpdxExtractedLicensingInfo_Enhance_AddsOrUpdatesInformationCorrectly
              - SpdxExtractedLicensingInfo_Validate_ValidInput_ReturnsNoIssues
              - SpdxExtractedLicensingInfo_Validate_InvalidLicenseId_ReportsIssue
              - SpdxExtractedLicensingInfo_Validate_InvalidExtractedText_ReportsIssue
