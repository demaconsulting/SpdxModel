---
# SpdxRelationship Unit Requirements
#
# This file defines requirements for the SpdxRelationship unit.

sections:
  - title: SpdxRelationship Unit Requirements
    requirements:
      - id: SpdxModel-Data-Relationships
        title: The library shall support SPDX relationships.
        tags:
          - data-model
        justification: |
          Relationships define connections between SPDX elements and are critical for expressing
          dependency graphs, containment hierarchies, and other associations in SBOMs. This is
          fundamental to representing complex software structures.
        tests:
          - SpdxRelationship_SameComparer_ComparesCorrectly
          - SpdxRelationship_SameElementsComparer_ComparesCorrectly
          - SpdxRelationship_DeepCopy_CreatesEqualButDistinctInstance
          - SpdxRelationship_Enhance_AddsOrUpdatesInformationCorrectly
          - SpdxRelationship_Validate_MissingId
          - SpdxRelationship_Validate_MissingRelatedId
          - SpdxRelationship_Validate_MissingRelationship
          - SpdxRelationshipTypeExtensions_FromText_Valid
          - SpdxRelationshipTypeExtensions_FromText_Invalid
          - SpdxRelationshipTypeExtensions_ToText_Valid
          - SpdxRelationshipTypeExtensions_ToText_Invalid
