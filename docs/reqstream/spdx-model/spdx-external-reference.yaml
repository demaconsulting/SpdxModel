---
# SpdxExternalReference unit requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: SpdxExternalReference Requirements
        requirements:
          - id: SpdxModel-Data-ExternalReferences
            title: The library shall support SPDX external references.
            tags:
              - data-model
            justification: |
              External references enable linking SPDX elements to external resources like package
              registries, vulnerability databases, and documentation. This enriches SBOMs with
              contextual information from authoritative sources.
            tests:
              - SpdxExternalReference_SameComparer_ComparesCorrectly
              - SpdxExternalReference_DeepCopy_CreatesEqualButDistinctInstance
              - SpdxExternalReference_Enhance_AddsOrUpdatesInformationCorrectly
              - SpdxExternalReference_Validate_InvalidCategory_ReportsIssue
              - SpdxExternalReference_Validate_InvalidType_ReportsIssue
              - SpdxExternalReference_Validate_InvalidLocator_ReportsIssue
              - SpdxReferenceCategoryExtensions_FromText_ValidInput_ParsesCorrectly
              - SpdxReferenceCategoryExtensions_FromText_InvalidInput_ReturnsNull
              - SpdxReferenceCategoryExtensions_ToText_ValidReference_FormatsCorrectly
              - SpdxReferenceCategoryExtensions_ToText_InvalidCategory_ReturnsNull
              - SpdxReferenceCategoryExtensions_ToText_MissingCategory_ReturnsNull
