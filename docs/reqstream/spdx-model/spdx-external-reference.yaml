---
# SpdxExternalReference Unit Requirements
#
# This file defines requirements for the SpdxExternalReference unit.

sections:
  - title: SpdxExternalReference Unit Requirements
    requirements:
      - id: SpdxModel-Data-ExternalReferences
        title: The library shall support SPDX external references.
        tags:
          - data-model
        justification: |
          External references enable linking SPDX elements to external resources like package
          registries, vulnerability databases, and documentation. This enriches SBOMs with contextual
          information from authoritative sources.
        tests:
          - SpdxExternalReference_SameComparer_ComparesCorrectly
          - SpdxExternalReference_DeepCopy_CreatesEqualButDistinctInstance
          - SpdxExternalReference_Enhance_AddsOrUpdatesInformationCorrectly
          - SpdxExternalReference_Validate_InvalidCategory
          - SpdxExternalReference_Validate_InvalidType
          - SpdxExternalReference_Validate_InvalidLocator
          - SpdxReferenceCategoryExtensions_FromText_Valid
          - SpdxReferenceCategoryExtensions_FromText_Invalid
          - SpdxReferenceCategoryExtensions_ToText_Valid
          - SpdxReferenceCategoryExtensions_ToText_InvalidCategory
          - SpdxReferenceCategoryExtensions_ToText_MissingCategory
