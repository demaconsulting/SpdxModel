---
# SpdxExternalDocumentReference unit requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: SpdxExternalDocumentReference Requirements
        requirements:
          - id: SpdxModel-Data-ExternalDocumentReferences
            title: The library shall support SPDX external document references.
            tags:
              - data-model
            justification: |
              External document references allow SPDX documents to reference other SPDX documents,
              enabling modular SBOM construction and linking between related software inventories. This
              is essential for managing complex multi-component software systems.
            tests:
              - SpdxExternalDocumentReference_SameComparer_SameDocument_ReturnsEqual
              - SpdxExternalDocumentReference_DeepCopy_ValidInstance_ReturnsEqualButDistinctInstance
              - SpdxExternalDocumentReference_Enhance_WithNewAndMatchingEntries_MergesAndAppendsCorrectly
              - SpdxExternalDocumentReference_Validate_MissingId_ReportsIssue
              - SpdxExternalDocumentReference_Validate_MissingDocument_ReportsIssue
              - SpdxExternalDocumentReference_Validate_InvalidChecksum_ReportsIssue
