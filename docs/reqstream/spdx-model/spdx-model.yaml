---
# SpdxModel system-level requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: SPDX Elements
        requirements:
          - id: SpdxModel-Data-Elements
            title: The library shall provide an in-memory model for all SPDX 2.x element types.
            tags:
              - data-model
            justification: |
              Supporting all SPDX 2.x element types ensures complete coverage of the specification
              and enables applications to work with any SPDX document without information loss.
            tests:
              - SpdxModel_ReadSpdxJson_Spdx22Example_ParsesSuccessfully
              - SpdxModel_ReadSpdxJson_Spdx23Example_ParsesSuccessfully
            children:
              - SpdxModel-Data-Document-Ntia
              - SpdxModel-Data-Document-ElementQuery
              - SpdxModel-Data-ExternalDocumentReferences
              - SpdxModel-Data-ExternalReferences
              - SpdxModel-Data-ExtractedLicensingInformation
              - SpdxModel-Data-Snippet-DataModel
              - SpdxModel-Data-LicenseElement
              - SpdxModel-Data-RelationshipType-Conversion
          - id: SpdxModel-Data-Helpers
            title: The library shall provide helper utilities for SPDX data processing.
            tags:
              - data-model
            justification: |
              Helper utilities provide shared functionality used across the data model, including
              date-time validation and string enhancement operations.
            tests:
              - SpdxModel_Helpers_DateTimeValidation_IsObservableThroughDocumentModel
            children:
              - SpdxModel-Data-Helpers-DateTime
              - SpdxModel-Data-Helpers-EnhanceString
              - SpdxModel-Data-LicenseElement-Enhance
              - SpdxModel-Data-Package-Enhance
              - SpdxModel-Data-PackageVerificationCode-Enhance
              - SpdxModel-Data-Checksum-Enhance
              - SpdxModel-Data-Relationship-Enhance
              - SpdxModel-Data-Snippet-Enhance

      - title: Data Model
        requirements:
          - id: SpdxModel-Data-RootPackages
            title: The library shall support retrieving root packages from an SPDX document.
            tags:
              - data-model
            justification: |
              Retrieving root packages helps identify top-level components in an SBOM. This is essential
              for understanding the primary software packages in a document and navigating the dependency
              graph from its entry points.
            children:
              - SpdxModel-Data-Document-RootPackageQuery
            tests:
              - SpdxModel_ReadSpdxJson_Spdx23Example_RootPackagesIdentified

          - id: SpdxModel-Data-DeepCopy
            title: The library shall support deep copying of SPDX elements.
            tags:
              - data-model
            justification: |
              Deep copying enables creating independent copies of SPDX elements for modification without
              affecting the original. This is crucial for SBOM manipulation scenarios like merging,
              filtering, or transforming documents.
            children:
              - SpdxModel-Data-Document
              - SpdxModel-Data-Package-DeepCopy
              - SpdxModel-Data-PackageVerificationCode-DeepCopy
              - SpdxModel-Data-Checksum-DeepCopy
              - SpdxModel-Data-Relationship-DeepCopy
              - SpdxModel-Data-Snippet-DeepCopy
              - SpdxModel-Data-Files
            tests:
              - SpdxModel_ReadSpdxJson_Spdx23Example_DeepCopyProducesEquivalentDocument

          - id: SpdxModel-Data-FieldOptionality
            title: The library API shall explicitly express whether each field is required or optional.
            tags:
              - data-model
            justification: |
              Explicitly expressing field optionality in the API improves type safety, reduces
              null reference errors at the call site, and makes the API more intuitive for consumers.
            children:
              - SpdxModel-Data-Element
              - SpdxModel-Data-Document
              - SpdxModel-Data-Package-Validate
            tests:
              - SpdxModel_FieldOptionality_RequiredFieldsNotNull_OptionalFieldsNullable

          - id: SpdxModel-Data-ComparisonUtilities
            title: The library shall provide comparison utilities for SPDX elements.
            tags:
              - data-model
            justification: |
              Comparison utilities enable applications to determine equality and equivalence between
              SPDX elements. This is essential for testing, change detection, and implementing operations
              like document merging or deduplication.
            children:
              - SpdxModel-Data-Document
              - SpdxModel-Data-Package-Compare
              - SpdxModel-Data-PackageVerificationCode-Compare
              - SpdxModel-Data-Checksum-Compare
              - SpdxModel-Data-Files
              - SpdxModel-Data-Relationship-Compare
              - SpdxModel-Data-Snippet-DataModel
            tests:
              - SpdxModel_ReadSpdxJson_Spdx23Example_DeepCopyProducesEquivalentDocument

      - title: Validation
        requirements:
          - id: SpdxModel-Validation-ElementValidation
            title: The library shall support validation of SPDX elements.
            tags:
              - validation
            justification: |
              Validation ensures SPDX documents and elements conform to the specification requirements.
              This helps users catch errors early and produce compliant SBOMs that will be accepted by
              other tools in the SPDX ecosystem.
            children:
              - SpdxModel-Data-Document-Validate
              - SpdxModel-Data-Annotations
              - SpdxModel-Data-Checksum-Validate
              - SpdxModel-Data-Checksum-FromText
              - SpdxModel-Data-Checksum-ToText
              - SpdxModel-Data-CreationInformation
              - SpdxModel-Data-Package-Validate
              - SpdxModel-Data-PackageVerificationCode-Validate
              - SpdxModel-Data-Package-ValidateNtia
              - SpdxModel-Data-Relationship-Validate
              - SpdxModel-Data-Snippet-Validate
            tests:
              - SpdxModel_ReadSpdxJson_Spdx22Example_PassesValidation
              - SpdxModel_ReadSpdxJson_Spdx23Example_PassesValidation

      - title: JSON Serialization
        requirements:
          - id: SpdxModel-IO-ReadSpdxJson
            title: The library shall support reading SPDX 2.x documents from JSON format.
            tags:
              - io
              - serialization
            justification: |
              JSON deserialization is the primary mechanism for reading SPDX documents produced by
              other tools. Supporting both SPDX 2.2 and 2.3 formats ensures compatibility with the
              broad ecosystem of SPDX tooling and enables consumers to work with existing SBOMs.
            children:
              - SpdxModel-IO-Deserialization
            tests:
              - SpdxModel_ReadSpdxJson_Spdx22Example_ParsesSuccessfully
              - SpdxModel_ReadSpdxJson_Spdx23Example_ParsesSuccessfully

          - id: SpdxModel-IO-WriteSpdxJson
            title: The library shall support writing SPDX 2.x documents to JSON format.
            tags:
              - io
              - serialization
            justification: |
              JSON serialization enables applications to produce SPDX documents for distribution,
              toolchain integration, and compliance reporting. Producing well-formed SPDX JSON ensures
              interoperability with other tools in the SPDX ecosystem.
            children:
              - SpdxModel-IO-Serialization
            tests:
              - SpdxModel_WriteReadSpdxJson_Spdx23Example_RoundTripSucceeds

      - title: Transform
        requirements:
          - id: SpdxModel-Transform
            title: The library shall provide utilities for transforming SPDX documents.
            tags:
              - transform
            justification: |
              Transform utilities enable programmatic modification of SPDX documents, supporting
              use cases where documents need to be modified or enriched after initial creation.
            children:
              - SpdxModel-Transform-Utilities
            tests:
              - SpdxModel_Transform_AddRelationship_IsObservableThroughDocumentModel
