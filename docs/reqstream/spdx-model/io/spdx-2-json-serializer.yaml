---
# Spdx2JsonSerializer unit requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: IO Requirements
        sections:
          - title: Spdx2JsonSerializer Requirements
            requirements:
              - id: SpdxModel-IO-SerializeJson
                title: The library shall support serializing SPDX documents to JSON format.
                tags:
                  - serialization
                justification: |
                  Serialization capability is fundamental for creating and exporting SPDX documents in JSON
                  format. This enables users to generate SBOMs programmatically and share them with other
                  systems and tools in the SPDX ecosystem.
                tests:
                  - Spdx2JsonSerializer_SerializeDocument_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_Serialize_ValidInput_CorrectResults

              - id: SpdxModel-IO-SerializeElements
                title: The library shall correctly serialize all SPDX 2.x element types to JSON.
                tags:
                  - serialization
                justification: |
                  Each SPDX element type (annotation, checksum, package, file, snippet, relationship, etc.)
                  has distinct JSON representation and field mappings. Verifying each element type is
                  serialized correctly ensures the library faithfully produces all artifacts when writing
                  an SPDX JSON document.
                tests:
                  - Spdx2JsonSerializer_SerializeAnnotation_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeAnnotations_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeAnnotation_NoId_OmitsSpdxId
                  - Spdx2JsonSerializer_SerializeChecksum_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeChecksums_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeCreationInformation_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeExternalDocumentReference_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeExternalDocumentReferences_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeExternalReference_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeExternalReferences_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeExtractedLicensingInfo_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeExtractedLicensingInfos_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeFile_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeFiles_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializePackage_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializePackages_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeVerificationCode_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeRelationship_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeRelationships_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeSnippet_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeSnippets_ValidInput_CorrectResults
                  - Spdx2JsonSerializer_SerializeSnippet_WithAnnotation_IncludesAnnotation
                  - Spdx2JsonSerializer_SerializeSnippet_NoLineRange_EmitsByteRangeOnly
                  - Spdx2JsonSerializer_SerializeSnippet_PartialLineRange_EmitsByteRangeOnly
