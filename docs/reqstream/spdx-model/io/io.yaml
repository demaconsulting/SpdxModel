---
# IO subsystem requirements

sections:
  - title: SpdxModel Requirements
    sections:
      - title: IO Requirements
        requirements:
          - id: SpdxModel-IO-Deserialization
            title: The library shall support JSON deserialization of SPDX 2.x documents.
            tags:
              - io
              - serialization
            justification: |
              JSON deserialization is the primary mechanism for reading SPDX documents produced by
              other tools. Supporting both SPDX 2.2 and 2.3 formats ensures compatibility with the
              broad ecosystem of SPDX tooling.
            children:
              - SpdxModel-IO-Spdx2JsonDeserializer-Deserialize22Json
              - SpdxModel-IO-Spdx2JsonDeserializer-Deserialize23Json
              - SpdxModel-IO-Spdx2JsonDeserializer-DeserializeElements
            tests:
              - SpdxModelIO_ReadWriteSpdxJson_Spdx22Document_RoundTripProducesValidDocument
              - SpdxModelIO_ReadWriteSpdxJson_Spdx23Document_RoundTripProducesValidDocument

          - id: SpdxModel-IO-Serialization
            title: The library shall support JSON serialization of SPDX 2.x documents.
            tags:
              - io
              - serialization
            justification: |
              JSON serialization enables applications to produce SPDX documents for distribution,
              toolchain integration, and compliance reporting. Producing well-formed SPDX JSON ensures
              interoperability with other tools in the SPDX ecosystem.
            children:
              - SpdxModel-Serialization-SerializeJson
              - SpdxModel-Serialization-SerializeElements
            tests:
              - SpdxModelIO_ReadWriteSpdxJson_Spdx22Document_RoundTripProducesValidDocument
              - SpdxModelIO_ReadWriteSpdxJson_Spdx23Document_RoundTripProducesValidDocument
