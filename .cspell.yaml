# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/thirdparty/**"
  - "**/third-party/**"
  - "**/3rd-party/**"
  - "**/AGENT_REPORT_*.md"
  - "**/.agent-logs/**"
  - "**/bin/**"
  - "**/obj/**"
  - "*.nupkg"
  - "*.snupkg"
  - "*.dll"
  - "*.exe"
  - "*.trx"
  - "*.spdx.json"
  - package-lock.json
  - yarn.lock
