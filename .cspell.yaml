---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: "0.2"
language: en

# Project-specific technical terms and tool names
words:
  - acmecorp
  - acmenator
  - Alsos
  - buildmark
  - Cyper
  - Dema
  - Doap
  - fileassert
  - hotspots
  - mstest
  - Neko
  - netstandard
  - NOASSERTION
  - Ntia
  - NTIA
  - opencover
  - pandoc
  - Protecode
  - reqstream
  - reviewmark
  - sarifmark
  - Sarif
  - sonarmark
  - SPDXID
  - SPDXJSON
  - versionmark
  - weasyprint
  - Weasy
  - yamlfix

# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/thirdparty/**"
  - "**/third-party/**"
  - "**/3rd-party/**"
  - "**/AGENT_REPORT_*.md"
  - "**/.agent-logs/**"
  - "**/bin/**"
  - "**/obj/**"
  - "*.nupkg"
  - "*.snupkg"
  - "*.dll"
  - "*.exe"
  - "*.trx"
  - "*.spdx.json"
  - package-lock.json
  - yarn.lock
