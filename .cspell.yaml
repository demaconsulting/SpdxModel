  - deserializer
  - DOAP
  - Doap
  - doctitle
  - dotnet
  - editorconfig
  - filepart
  - fsproj
  - Gidget
  - gitattributes
  - hotspots
  - ibiqlik
  - LINQ
  - maintainer
  - markdownlint
  - mermaid
